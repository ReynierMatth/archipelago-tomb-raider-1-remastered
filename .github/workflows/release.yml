name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build client
        run: dotnet publish client/TRArchipelagoClient/TRArchipelagoClient.csproj -c Release -o publish

      - name: Package APWorld
        run: |
          cd apworld
          Compress-Archive -Path tr123r -DestinationPath tr123r.apworld
          Move-Item tr123r.apworld ../publish/
        shell: pwsh

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/TRArchipelagoClient.exe
            publish/tr123r.apworld
          generate_release_notes: true
          prerelease: true
