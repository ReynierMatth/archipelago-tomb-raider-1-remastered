name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet publish client/TRArchipelagoClient/TRArchipelagoClient.csproj -c Release -o publish

      - uses: softprops/action-gh-release@v2
        with:
          files: publish/TRArchipelagoClient.exe
          generate_release_notes: true
          prerelease: true
